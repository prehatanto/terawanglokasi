<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Info</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
        .hero-image {
            max-width: 500px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(123, 47, 247, 0.3);
            margin-bottom: 2rem;
        }
        .info-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 1.5rem;
            width: 100%;
            max-width: 560px;
            margin-bottom: 1.5rem;
        }
        .info-card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #00d2ff;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #222240;
            font-size: 0.9rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #888; flex-shrink: 0; margin-right: 1rem; min-width: 100px; }
        .info-value {
            color: #ccc;
            text-align: right;
            word-break: break-all;
            max-width: 65%;
        }
        .info-value.ok { color: #00e676; }
        .info-value.err { color: #ff5252; }
        .info-value.warn { color: #ffc107; }
        .map-wrap {
            width: 100%;
            max-width: 560px;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }
        #map { width: 100%; height: 300px; }
        .footer { margin-top: 2rem; color: #555; font-size: 0.8rem; text-align: center; }
        .loading { color: #00d2ff; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #error-box {
            background: #2a0a0a; border: 1px solid #ff5252; border-radius: 8px;
            padding: 1rem; width: 100%; max-width: 560px; margin-bottom: 1.5rem;
            font-size: 0.85rem; color: #ff8a80; white-space: pre-wrap; display: none;
        }
        #db-status {
            text-align: center; padding: 0.6rem 1rem; font-size: 0.85rem;
            border-radius: 8px; width: 100%; max-width: 560px;
            margin-bottom: 1.5rem; background: #1a1a2e; border: 1px solid #2a2a4a;
        }
        #db-status.ok { border-color: #00e676; color: #00e676; }
        #db-status.err { border-color: #ff5252; color: #ff5252; }
    </style>
</head>
<body>

    <h1>👋 Hello, Visitor!</h1>
    <p class="subtitle">Halaman ini mendeteksi informasi client kamu.</p>

    <img
        class="hero-image"
        src="https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=800&q=80"
        alt="Hero image"
    />

    <div id="error-box"></div>
    <div id="db-status" class="loading">💾 Menyimpan ke database…</div>

    <!-- Waktu -->
    <div class="info-card">
        <h2>🕐 Tanggal & Waktu</h2>
        <div class="info-row">
            <span class="info-label">Waktu</span>
            <span class="info-value" id="datetime">—</span>
        </div>
    </div>

    <!-- Info Client -->
    <div class="info-card">
        <h2>📋 Info Client</h2>
        <div class="info-row">
            <span class="info-label">1. Browser</span>
            <span class="info-value" id="browser">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">2. IP Address</span>
            <span class="info-value loading" id="ip">Loading…</span>
        </div>
        <div class="info-row">
            <span class="info-label">3. Lokasi</span>
            <span class="info-value loading" id="location">Loading…</span>
        </div>
        <div class="info-row">
            <span class="info-label">4. ISP / Provider</span>
            <span class="info-value loading" id="isp">Loading…</span>
        </div>
        <div class="info-row">
            <span class="info-label">Akurasi</span>
            <span class="info-value" id="accuracy">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">Sumber Lokasi</span>
            <span class="info-value" id="source">—</span>
        </div>
    </div>

    <!-- Map -->
    <div class="map-wrap">
        <div id="map"></div>
    </div>

    <p class="footer">Dibuat dengan ❤️ — vanilla JS + Leaflet + Supabase</p>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const $ = (id) => document.getElementById(id);
        function show(id, text, type) {
            const el = $(id);
            el.textContent = text;
            el.className = 'info-value' + (type ? ' ' + type : '');
        }
        function showErr(msg) {
            const box = $('error-box');
            box.style.display = 'block';
            box.textContent = msg;
        }

        /* ─── Supabase ─── */
        const SUPABASE_URL = 'https://hghwslxuxsnhvqjzpbck.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RVvA9x5kUmLYbh4KezfMWg_MLmedV90';
        const TABLE = 'client_info';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        /* ─── Waktu ─── */
        const tick = () => {
            const now = new Date();
            const o = {
                weekday:'long', year:'numeric', month:'long', day:'numeric',
                hour:'2-digit', minute:'2-digit', second:'2-digit',
                timeZoneName:'short'
            };
            show('datetime', now.toLocaleDateString('id-ID', o), 'ok');
        };
        tick();
        setInterval(tick, 1000);

        /* ─── Browser ─── */
        const ua = navigator.userAgent;
        let bn = 'Unknown';
        if (/Firefox\//.test(ua))             bn = 'Mozilla Firefox';
        else if (/Edg\//.test(ua))             bn = 'Microsoft Edge';
        else if (/OPR\//.test(ua))             bn = 'Opera';
        else if (/Chrome\//.test(ua))          bn = 'Google Chrome';
        else if (/Safari\//.test(ua) && !/Chrome/.test(ua)) bn = 'Apple Safari';
        show('browser', bn, 'ok');

        /* ─── Map ─── */
        let map, marker, accuracyCircle;
        try {
            map = L.map('map').setView([-2.5, 118], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap', maxZoom: 19
            }).addTo(map);
        } catch(e) { showErr('Map init error: ' + e.message); }

        function plotOnMap(lat, lon, accuracy, sourceLabel) {
            map.setView([lat, lon], 16);
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lon]).addTo(map)
                .bindPopup(
                    '<b>📍 Lokasi</b><br>' +
                    'Lat: ' + lat.toFixed(6) + '<br>' +
                    'Lon: ' + lon.toFixed(6) + '<br>' +
                    'Akurasi: ±' + Math.round(accuracy) + 'm<br>' +
                    'Sumber: ' + sourceLabel
                )
                .openPopup();
            if (accuracyCircle) map.removeLayer(accuracyCircle);
            accuracyCircle = L.circle([lat, lon], {
                radius: accuracy, color: '#7b2ff7', fillColor: '#7b2ff7',
                fillOpacity: 0.12, weight: 2
            }).addTo(map);
        }

        /* ─── Simpan ke Supabase ─── */
        async function saveToDB(data) {
            const ds = $('db-status');
            try {
                const { error } = await sb.from(TABLE).insert([{
                    browser:      data.browser,
                    ip_address:   data.ip,
                    latitude:     data.lat,
                    longitude:    data.lon,
                    city:         data.city,
                    region:       data.region,
                    country:      data.country,
                    isp:          data.isp,
                    accuracy_m:   data.accuracy,
                    source_type:  data.sourceType,
                    user_agent:   ua,
                    visited_at:   new Date().toISOString()
                }]);
                if (error) throw error;
                ds.textContent = '✅ Data berhasil disimpan ke Supabase';
                ds.className = 'ok';
            } catch(e) {
                console.error('DB error:', e);
                ds.textContent = '❌ Gagal simpan ke DB: ' + e.message;
                ds.className = 'err';
            }
        }

        /* ─── Ambil data dari API ─── */
        const APIS = [
            {
                url: 'https://ipapi.co/json/',
                parse: (d) => ({
                    ip: d.ip,
                    city: d.city, region: d.region, country: d.country_name,
                    lat: d.latitude, lon: d.longitude,
                    isp: d.org || d.asn || '—',
                })
            },
            {
                url: 'https://ip-api.com/json/?fields=status,country,regionName,city,lat,lon,query,org,as',
                parse: (d) => {
                    if (d.status !== 'success') throw new Error(d.message);
                    return {
                        ip: d.query,
                        city: d.city, region: d.regionName, country: d.country,
                        lat: d.lat, lon: d.lon,
                        isp: d.org || d.as || '—',
                    };
                }
            }
        ];

        async function fetchIPData() {
            for (const api of APIS) {
                try {
                    const res = await fetch(api.url);
                    if (!res.ok) continue;
                    return api.parse(await res.json());
                } catch(e) { console.warn('API failed:', api.url, e.message); }
            }
            return null;
        }

        // Flow utama
        (async () => {
            const ipData = await fetchIPData();

            if (!ipData) {
                show('ip', 'Gagal', 'err');
                show('location', 'Gagal', 'err');
                show('isp', 'Gagal', 'err');
                showErr('Semua API gagal. Coba buka via HTTP server, bukan file://');
                return;
            }

            // Tampilin data IP dulu
            show('ip', ipData.ip, 'ok');
            show('location', ipData.city + ', ' + ipData.region + ', ' + ipData.country, 'warn');
            show('isp', ipData.isp, 'ok');
            show('accuracy', '±~20 km (IP-based)', 'warn');
            show('source', '🌐 IP Geolocation', 'warn');
            plotOnMap(ipData.lat, ipData.lon, 20000, 'IP');

            // Simpan ke DB (data IP-based dulu)
            saveToDB({
                browser: bn,
                ip: ipData.ip,
                lat: ipData.lat,
                lon: ipData.lon,
                city: ipData.city,
                region: ipData.region,
                country: ipData.country,
                isp: ipData.isp,
                accuracy: 20000,
                sourceType: 'ip'
            });
        })();

        /* ─── Coba Geolocation (lebih presisi, update DB kalau berhasil) ─── */
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const acc = pos.coords.accuracy;

                    show('location', lat.toFixed(6) + ', ' + lon.toFixed(6), 'ok');
                    show('accuracy', '±' + Math.round(acc) + ' meter', 'ok');
                    show('source', '🛰️ GPS / Geolocation API', 'ok');
                    plotOnMap(lat, lon, acc, 'GPS');

                    // Update DB dengan lokasi presisi
                    saveToDB({
                        browser: bn,
                        ip: $('ip').textContent,
                        lat, lon,
                        city: '', region: '', country: '',
                        isp: $('isp').textContent,
                        accuracy: acc,
                        sourceType: 'gps'
                    });
                },
                (err) => { console.warn('Geolocation denied:', err.message); },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }
    </script>
</body>
</html>
