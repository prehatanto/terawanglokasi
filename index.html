<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Info</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
        .hero-image {
            max-width: 500px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(123, 47, 247, 0.3);
            margin-bottom: 2rem;
        }
        .info-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 1.5rem;
            width: 100%;
            max-width: 560px;
            margin-bottom: 1.5rem;
        }
        .info-card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #00d2ff;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #222240;
            font-size: 0.9rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #888; flex-shrink: 0; margin-right: 1rem; }
        .info-value {
            color: #ccc;
            text-align: right;
            word-break: break-all;
            max-width: 65%;
        }
        .footer {
            margin-top: 2rem;
            color: #555;
            font-size: 0.8rem;
        }
        .loading { color: #00d2ff; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <h1>👋 Hello, Visitor!</h1>
    <p class="subtitle">Halaman ini mendeteksi informasi client kamu.</p>

    <img
        class="hero-image"
        src="https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=800&q=80"
        alt="Hero image"
    />

    <div class="info-card">
        <h2>📋 Info Client</h2>
        <div class="info-row">
            <span class="info-label">1. Browser</span>
            <span class="info-value" id="browser">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">2. IP Address</span>
            <span class="info-value" id="ip">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">3. Lokasi</span>
            <span class="info-value" id="location">—</span>
        </div>
    </div>

    <p class="footer">Dibuat dengan ❤️ menggunakan vanilla JS</p>

    <script>
        const set = (id, val) => {
            const el = document.getElementById(id);
            el.textContent = val;
            el.classList.remove('loading');
        };
        const loading = (id) => {
            const el = document.getElementById(id);
            el.textContent = 'Loading…';
            el.classList.add('loading');
        };

        // 1. Nama browser
        const ua = navigator.userAgent;
        let browserName = 'Unknown';
        if (ua.includes('Firefox/')) browserName = 'Mozilla Firefox';
        else if (ua.includes('Edg/')) browserName = 'Microsoft Edge';
        else if (ua.includes('OPR/') || ua.includes('Opera')) browserName = 'Opera';
        else if (ua.includes('Chrome/')) browserName = 'Google Chrome';
        else if (ua.includes('Safari/') && !ua.includes('Chrome')) browserName = 'Apple Safari';
        set('browser', browserName);

        // 2 & 3. IP + Lokasi dari API publik
        loading('ip');
        loading('location');

        fetch('http://ip-api.com/json/?fields=status,message,country,regionName,city,lat,lon,query')
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    set('ip', data.query);
                    set('location',
                        data.city + ', ' + data.regionName + ', ' + data.country +
                        ' (📍 ' + data.lat + ', ' + data.lon + ')'
                    );
                } else {
                    set('ip', 'Gagal');
                    set('location', data.message || 'Gagal');
                }
            })
            .catch(err => {
                set('ip', 'Error: ' + err.message);
                set('location', 'Error: tidak bisa mengambil lokasi');
            });
    </script>
</body>
</html>
